# Deploys via Vercel CLI. Add GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (Vercel dashboard → Project → Settings → Environment / or `vercel link`.)
# If the repo is already connected in Vercel’s Git tab, you can rely on that instead and disable this workflow to avoid double deploys.
#
# Triggers: every push (all branches) + manual. main/master → production; other branches → preview.

name: Deploy to Vercel

on:
  push:
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate required Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required GitHub secret: VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing required GitHub secret: VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required GitHub secret: VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Pull, build, and deploy (production on main/master)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Pull, build, and deploy (preview on other branches)
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: |
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --token="$VERCEL_TOKEN"
